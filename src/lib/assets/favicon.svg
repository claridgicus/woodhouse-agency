<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <title>Woodhouse Agency</title>
  <!-- Background: Woodhouse Navy -->
  <rect width="32" height="32" rx="6" fill="#0d1b2a"/>
  <!-- Multiplier Mark: three connected nodes forming an upward arrow
       Node A (bottom-left), Node B (middle), Node C (top-right)
       Edges connect A→B and B→C, with an implied upward trajectory -->
  <!-- Connecting lines -->
  <line x1="8" y1="22" x2="16" y2="14" stroke="#4f46e5" stroke-width="2" stroke-linecap="round"/>
  <line x1="16" y1="14" x2="24" y2="7" stroke="#4f46e5" stroke-width="2" stroke-linecap="round"/>
  <!-- Secondary network edge (A→C dashed visual depth) -->
  <line x1="8" y1="22" x2="24" y2="7" stroke="#4f46e5" stroke-width="1" stroke-linecap="round" stroke-dasharray="2 3" opacity="0.4"/>
  <!-- Nodes -->
  <circle cx="8" cy="22" r="3" fill="#818cf8"/>
  <circle cx="16" cy="14" r="3" fill="#4f46e5"/>
  <circle cx="24" cy="7" r="3.5" fill="white"/>
</svg>
